<VirtualHost *:80>
        ServerName git.ruby-lang.org
        ServerAdmin webmaster@ruby-lang.org

        # for let's encrypt
        DocumentRoot /var/www/git.ruby-lang.org

        Alias /.well-known/ "/var/www/git.ruby-lang.org/.well-known/"
        <Directory "/var/www/git.ruby-lang.org/.well-known/">
                AllowOverride None
                Options Indexes FollowSymlinks
                Require all granted
        </Directory>

        RedirectMatch permanent ^/(?!.well-known)(.*) https://git.ruby-lang.org/$1
</VirtualHost>

<VirtualHost *:443>
        ServerName git.ruby-lang.org
        ServerAdmin webmaster@ruby-lang.org

        SSLEngine on
        SSLCertificateFile    /etc/letsencrypt/live/git.ruby-lang.org-0001/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/git.ruby-lang.org-0001/privkey.pem

        TimeOut 300

        # Alias /robots.txt "/var/www/git.ruby-lang.org/robots.txt"
        DocumentRoot /var/www/git.ruby-lang.org

        RewriteEngine On
        RewriteCond %{QUERY_STRING} (?:^|&)id=([0-9a-fA-F]{7,40})
        RewriteRule ^/ruby\.git/(?:log|commit|diff|patch)(?:/.*)?$ https://github.com/ruby/ruby/commit/%1 [R=302,L,NE,QSD]
        RewriteCond %{QUERY_STRING} (?:^|&)id=([0-9a-fA-F]{7,40})
        RewriteRule ^/ruby\.git/tree/(.*)$ https://github.com/ruby/ruby/tree/%1/$1 [R=302,L,NE,QSD]
        RewriteCond %{QUERY_STRING} (?:^|&)id=([0-9a-fA-F]{7,40})
        RewriteRule ^/ruby\.git/plain/(.*)$ https://github.com/ruby/ruby/raw/%1/$1 [R=302,L,NE,QSD]
        RewriteRule ^/ruby\.git/plain/(.*)$ https://github.com/ruby/ruby/raw/master/$1 [R=302,L,NE,QSD]
</VirtualHost>
